<article class="card">
  <div class="card__meta">
    <span>{{ .Date.Format "2006-01-02" }}</span>
    {{ with index .Params.categories 0 }}
      <span>{{ . }}</span>
    {{ end }}
  </div>
  <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
  <p>{{ with .Params.description }}{{ . }}{{ else }}{{ .Summary | plainify | truncate 110 }}{{ end }}</p>
  {{ with .Params.tags }}
    <div class="pill-row">
      {{ range first 2 . }}
        <a class="pill pill--subtle" href="{{ `/tags/` | relLangURL }}{{ . | urlize }}/">#{{ . }}</a>
      {{ end }}
    </div>
  {{ end }}
</article>
