<header class="topbar">
  <div class="topbar__inner">
    <a class="brand" href="/">{{ site.Title }}</a>
    <div class="topbar__actions">
      <nav class="nav" aria-label="主导航" data-i18n-attr="aria-label:nav.ariaLabel">
        {{ range site.Menus.main }}
          {{ $isActive := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) (eq $.RelPermalink .URL) }}
          <a
            class="{{ if $isActive }}is-active{{ end }}"
            href="{{ .URL }}"
            data-i18n="{{ if eq .URL `/` }}nav.home{{ else if eq .URL `/posts/` }}nav.posts{{ else if eq .URL `/topics/` }}nav.topics{{ else if eq .URL `/projects/` }}nav.projects{{ end }}"
          >{{ .Name }}</a>
        {{ end }}
      </nav>
      <div class="toolbar" aria-label="界面设置" data-i18n-attr="aria-label:toolbar.ariaLabel">
        <div class="toolbar__menu">
          <button
            class="toolbar__trigger"
            type="button"
            data-ui-lang-toggle
            aria-label="语言切换"
            title="语言切换"
            data-i18n-attr="aria-label:toolbar.language,title:toolbar.language"
          >
            <svg class="toolbar__icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9Zm0 1.8c1.42 1.58 2.29 3.72 2.48 6.3H9.52c.19-2.58 1.06-4.72 2.48-6.3Zm-3.31.75c-.7 1.58-1.14 3.44-1.26 5.55H4.95a7.24 7.24 0 0 1 3.74-5.55Zm-3.74 7.35h2.48c.12 2.11.56 3.97 1.26 5.55a7.24 7.24 0 0 1-3.74-5.55Zm4.57 0h4.96c-.19 2.58-1.06 4.72-2.48 6.3-1.42-1.58-2.29-3.72-2.48-6.3Zm5.79 5.55c.7-1.58 1.14-3.44 1.26-5.55h2.48a7.24 7.24 0 0 1-3.74 5.55Zm1.26-7.35c-.12-2.11-.56-3.97-1.26-5.55a7.24 7.24 0 0 1 3.74 5.55h-2.48Z" />
            </svg>
          </button>
        </div>
        <div class="toolbar__menu" data-ui-menu="theme" data-ui-menu-open="false">
          <button
            class="toolbar__trigger"
            type="button"
            data-ui-menu-trigger="theme"
            aria-expanded="false"
            aria-haspopup="true"
            aria-controls="toolbar-panel-theme"
            aria-label="配色切换"
            title="配色切换"
            data-i18n-attr="aria-label:toolbar.theme,title:toolbar.theme"
          >
            <svg class="toolbar__icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3a9 9 0 1 0 9 9c0-.62-.5-1.12-1.12-1.12H17.5a2.5 2.5 0 0 1 0-5H20c.55 0 1-.45 1-1 0-.31-.14-.6-.38-.79A9.06 9.06 0 0 0 12 3Zm-4.5 9.25a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5Zm3-4a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5Zm5 0a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5Zm2.5 4a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5Z" />
            </svg>
          </button>
          <div
            class="toolbar__panel"
            id="toolbar-panel-theme"
            role="group"
            aria-label="配色切换"
            data-i18n-attr="aria-label:toolbar.theme"
          >
            <button class="toolbar__option" type="button" data-ui-theme-option="light" aria-pressed="true" data-i18n="toolbar.themeLight">亮色</button>
            <button class="toolbar__option" type="button" data-ui-theme-option="dark" aria-pressed="false" data-i18n="toolbar.themeDark">暗色</button>
            <button class="toolbar__option" type="button" data-ui-theme-option="green" aria-pressed="false" data-i18n="toolbar.themeGreen">绿色</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
