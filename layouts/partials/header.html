<header class="topbar">
  <div class="topbar__inner">
    <a class="brand" href="/">{{ site.Title }}</a>
    <nav class="nav" aria-label="主导航">
      {{ range site.Menus.main }}
        {{ $isActive := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) (eq $.RelPermalink .URL) }}
        <a class="{{ if $isActive }}is-active{{ end }}" href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
