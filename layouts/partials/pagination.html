{{ with .Paginator }}
  {{ if gt .TotalPages 1 }}
    <nav class="pagination" aria-label="分页">
      {{ if .HasPrev }}
        <a href="{{ .Prev.URL }}">上一页</a>
      {{ end }}
      <span class="is-current">第 {{ .PageNumber }} / {{ .TotalPages }} 页</span>
      {{ if .HasNext }}
        <a href="{{ .Next.URL }}">下一页</a>
      {{ end }}
    </nav>
  {{ end }}
{{ end }}
