<article class="card">
  <div class="card__meta">
    <span data-i18n="projectCard.featured">精选项目</span>
    {{ with .Params.tech_stack }}
      <span>{{ delimit . " / " }}</span>
    {{ end }}
  </div>
  <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
  <p>{{ .Params.summary }}</p>
  <div class="pill-row">
    {{ if .Params.repo_url }}
      <a class="pill" href="{{ .Params.repo_url }}" target="_blank" rel="noreferrer" data-i18n="projectCard.repo">仓库</a>
    {{ end }}
    <a class="pill" href="{{ .RelPermalink }}" data-i18n="projectCard.details">详情</a>
  </div>
</article>
